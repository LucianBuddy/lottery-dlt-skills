# DLT彩票预测技能
name: dlt-lottery-prediction
version: 1.0.0
description: 中国体育彩票超级大乐透（DLT）预测技能，基于深度学习的彩票号码预测系统
author: 贾维斯 (J.A.R.V.I.S.)
license: MIT

# 技能类型
type: prediction
category: lottery
tags:
  - lottery
  - prediction
  - dlt
  - deep-learning
  - china-lottery

# 运行时要求
runtime:
  python: ">=3.8"
  dependencies:
    - tensorflow>=2.21.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - matplotlib>=3.7.0
    - scikit-learn>=1.3.0

# 技能配置
config:
  data_file_path:
    type: string
    default: "data/DLT历史数据_适配模型版.xlsx"
    description: "DLT历史数据文件路径（技能包 data/ 目录下）"
  front_range:
    type: list
    default: [1, 35]
    description: "前区号码范围"
  back_range:
    type: list
    default: [1, 12]
    description: "后区号码范围"
  prediction_format:
    type: object
    default:
      front_count: 5
      back_count: 2
    description: "预测结果格式要求"
  hit_standard:
    type: object
    default:
      front_hit: 4
      back_hit: 1
    description: "命中标准目标"

# 技能入口点
entrypoint: dlt_lottery_skill.py
main_class: DLTLotterySkill

# 技能命令
commands:
  predict:
    description: "预测下一期DLT号码"
    usage: "dlt-lottery-prediction predict [--top-k N]"
    options:
      top-k:
        type: integer
        default: 3
        description: "生成预测方案数量"
  validate:
    description: "验证预测结果格式"
    usage: "dlt-lottery-prediction validate <front_numbers> <back_numbers>"
  train:
    description: "训练DLT预测模型"
    usage: "dlt-lottery-prediction train [--epochs N]"
    options:
      epochs:
        type: integer
        default: 100
        description: "训练轮数"
  backtest:
    description: "回测模型性能"
    usage: "dlt-lottery-prediction backtest [--periods N]"
    options:
      periods:
        type: integer
        default: 50
        description: "回测期数"

# 技能输出格式
output:
  predictions:
    type: array
    items:
      type: object
      properties:
        front_numbers:
          type: array
          items:
            type: integer
          description: "前区预测号码"
        back_numbers:
          type: array
          items:
            type: integer
          description: "后区预测号码"
        confidence:
          type: number
          description: "预测置信度"
        format_valid:
          type: boolean
          description: "格式验证结果"
  validation:
    type: object
    properties:
      valid:
        type: boolean
      errors:
        type: array
        items:
          type: string

# 技能元数据
metadata:
  created: "2026-03-22"
  updated: "2026-03-22"
  constraints:
    - "数据文件需放在 skills/dlt-lottery-prediction/data/ 目录下"
    - "彩票规则严格遵守：前区1-35选5，后区1-12选2"
    - "预测格式验证：前区≥5个不同号码 + 后区≥2个不同号码"
    - "命中标准：前区≥4个命中 + 后区≥1个命中"
    - "数据倒序处理：Excel文件中的数据已经是倒序排列"
    - "技能完全分离：不与SSQ技能交叉使用数据或规则"